[workspace]
members = [".", "crates/noloong-agent-core", "crates/noloong-agent"]
resolver = "3"

[workspace.package]
version = "0.1.0"
edition = "2024"

[workspace.dependencies]
noloong-agent-core = { path = "crates/noloong-agent-core" }
noloong-agent = { path = "crates/noloong-agent" }
bytes = "1.11"
memchr = "2.8"
reqwest = { version = "0.13", default-features = false, features = ["json", "rustls"] }
rusqlite = "0.39"
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
tokio = { version = "1.52", features = ["fs", "io-util", "macros", "net", "process", "rt-multi-thread", "sync", "time"] }
toasty = { version = "0.5", default-features = false, features = ["sqlite"] }
toasty-driver-sqlite = "0.5"

[workspace.lints.rust]
dead_code = "deny"

[package]
name = "noloong"
version.workspace = true
edition.workspace = true

[lints]
workspace = true

[dependencies]
