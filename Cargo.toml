[workspace]
members = [".", "crates/noloong-agent-core"]
resolver = "3"

[workspace.package]
version = "0.1.0"
edition = "2024"

[workspace.dependencies]
noloong-agent-core = { path = "crates/noloong-agent-core" }
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
reqwest = { version = "0.13", default-features = false, features = ["json", "rustls"] }
tokio = { version = "1.52", features = ["io-util", "macros", "net", "process", "rt-multi-thread", "sync", "time"] }

[package]
name = "noloong"
version.workspace = true
edition.workspace = true

[dependencies]
