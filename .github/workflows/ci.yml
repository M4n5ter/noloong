name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  test:
    name: Rust and extension checks
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "22"

      - name: Check formatting
        run: cargo fmt --check

      - name: Install Linux webview dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            curl \
            file \
            libayatana-appindicator3-dev \
            libdbus-1-dev \
            libglib2.0-dev \
            libgtk-3-dev \
            libssl-dev \
            librsvg2-dev \
            libwebkit2gtk-4.1-dev \
            libxdo-dev \
            pkg-config \
            wget

      - name: Lint
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: Test workspace
        run: cargo test --workspace

      - name: Check profile config schema
        run: cargo run -p noloong -- profile-config schema --check schemas/profile-config.schema.json

      - name: Check build info manifest
        run: cargo run -p noloong -- build-info manifest > /dev/null

      - name: Check build info source snapshot
        env:
          NOLOONG_EMBED_SOURCE_ARCHIVE: "1"
        run: cargo run -p noloong -- build-info source cat Cargo.toml > /dev/null

      - name: Build examples
        run: cargo test -p noloong-agent-core --examples

      - name: Check stdio fixture syntax
        run: node --check crates/noloong-agent-core/tests/fixtures/stdio-extension.mjs

      - name: Check OpenRouter fixture syntax
        run: node --check crates/noloong-agent-core/tests/fixtures/openrouter-deepseek-extension.mjs

      - name: Check AI SDK example syntax
        run: node --check examples/extensions/ai-sdk-provider/stdio-ai-sdk-extension.mjs
